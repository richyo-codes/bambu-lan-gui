      - name: Set SEMVER
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            semver="${GITHUB_REF_NAME#v}"
          else
            semver="$(git describe --always --tags --dirty 2>/dev/null || true)"
            if [[ -z "$semver" ]]; then
