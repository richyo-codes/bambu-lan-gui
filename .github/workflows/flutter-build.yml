  windows:
    name: Windows x64
    runs-on: [ubuntu-latest]
    concurrency:
      group: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Git describe
        id: ghd
        run: |
          echo "tag=$(git describe --always --tags --dirty)" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Include LICENSE in Release folder
        shell: pwsh
        run: Copy-Item -Path LICENSE -Destination build\windows\x64\runner\Release\LICENSE

      - name: Upload Windows artifact (Release folder)
        uses: richnetdesign/git-artifact-upload@v1
        with:
          name: windows-x64-release-${{ env.SEMVER }}
          path: build/windows/x64/runner/Release/**
          retention-days: 7

      - name: Create Windows MSIX (unsigned)
        run: |
          flutter pub get
          dart run msix:create

      - name: Version MSIX file(s)
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.msix | ForEach-Object {
            $dir = $_.DirectoryName
            $base = [System.IO.Path]::GetFileNameWithoutExtension($_.Name)
            Rename-Item -Path $_.FullName -NewName "$base-$env:SEMVER.msix"
          }

      - name: Upload Windows MSIX artifact
        uses: richnetdesign/git-artifact-upload@v1
        with:
          name: windows-msix-${{ env.SEMVER }}
          path: '**/*.msix'
          retention-days: 7

