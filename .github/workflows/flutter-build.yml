name: Flutter Build Printer GUI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      linux_gtk_variant:
        description: Linux runner variant for desktop packaging jobs
        required: false
        default: gtk3
        type: choice
        options:
          - gtk3
          - gtk4
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}


jobs:
  android:
    name: Android APK
    runs-on: [ubuntu-latest]
    env:
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Ensure Git LFS assets
        shell: bash
        run: |
          if ! command -v git-lfs >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y git-lfs
          fi
          git lfs install --local
          git lfs pull

      - name: Set SEMVER
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            semver="${GITHUB_REF_NAME#v}"
          else
            semver="$(git describe --always --tags --dirty 2>/dev/null || true)"
            if [[ -z "$semver" ]]; then
              semver="$(git rev-parse --short HEAD 2>/dev/null || true)"
            fi
            if [[ -z "$semver" ]]; then
              semver="0.0.0-unknown"
            fi
          fi
          echo "SEMVER=$semver" >> "$GITHUB_ENV"

      - name: Git describe
        id: ghd
        shell: bash
        run: |
          echo "tag=$(git describe --always --tags --dirty)" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install Android SDK command-line tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget unzip

          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          wget -qO /tmp/android-cmdline-tools.zip \
            https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q /tmp/android-cmdline-tools.zip -d /tmp/android-cmdline-tools
          rm -rf "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mv /tmp/android-cmdline-tools/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"

          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          # sdkmanager may exit early after consuming enough input, which causes
          # `yes` to receive SIGPIPE (141). Ignore that expected pipeline status.
          set +o pipefail
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" --licenses > /dev/null
          set -o pipefail
          "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Configure Flutter Android SDK path
        run: flutter config --android-sdk "$ANDROID_SDK_ROOT"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Android (release APK)
        run: flutter build apk --release

      - name: Stage artifacts with LICENSE
        run: |
          mkdir -p artifacts/android
          cp build/app/outputs/flutter-apk/app-release.apk "artifacts/android/app-release-$SEMVER.apk"
          cp LICENSE artifacts/android/

      - name: Upload Android artifact bundle
        uses: richnetdesign/git-artifact-upload@v2
        with:
          name: boomprint-android-apk
          version: ${{ env.SEMVER }}
          filename: boomprint-android-apk
          append-max-detail-suffix: true
          path: artifacts/android/**
          retention-days: 7

  linux:
    name: Linux x64
    runs-on: [ubuntu-latest]
    env:
      LINUX_GTK_VARIANT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.linux_gtk_variant || 'gtk3' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Ensure Git LFS assets
        shell: bash
        run: |
          if ! command -v git-lfs >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y git-lfs
          fi
          git lfs install --local
          git lfs pull

      - name: Set SEMVER
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            semver="${GITHUB_REF_NAME#v}"
          else
            semver="$(git describe --always --tags --dirty 2>/dev/null || true)"
            if [[ -z "$semver" ]]; then
              semver="$(git rev-parse --short HEAD 2>/dev/null || true)"
            fi
            if [[ -z "$semver" ]]; then
              semver="0.0.0-unknown"
            fi
          fi
          echo "SEMVER=$semver" >> "$GITHUB_ENV"

      - name: Git describe
        id: ghd
        shell: bash
        run: |
          echo "tag=$(git describe --always --tags --dirty)" >> "$GITHUB_OUTPUT"

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libgtk-4-dev liblzma-dev libmimalloc-dev libmimalloc2.0 libpulse-dev libsecret-1-dev libssl-dev curl git unzip xz-utils zip libglu1-mesa pkg-config libstdc++-12-dev libasound2-dev mpv libmpv-dev software-properties-common lld llvm
          sudo apt-get install -y mpv squashfs-tools patchelf desktop-file-utils zsync

          # Some Flutter/Dart toolchains look for linker binaries under llvm-18 path.
          # Provide compatibility symlinks when runner images use a different layout.
          if [ ! -x /usr/lib/llvm-18/bin/ld.lld ] && command -v ld.lld >/dev/null 2>&1; then
            sudo mkdir -p /usr/lib/llvm-18/bin
            sudo ln -sf "$(command -v ld.lld)" /usr/lib/llvm-18/bin/ld.lld
          fi
          if [ ! -x /usr/lib/llvm-18/bin/ld ] && command -v ld >/dev/null 2>&1; then
            sudo mkdir -p /usr/lib/llvm-18/bin
            sudo ln -sf "$(command -v ld)" /usr/lib/llvm-18/bin/ld
          fi
          ls -la /usr/lib/llvm-18/bin || true
          command -v ld.lld || true
          command -v ld || true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Select Linux runner variant
        shell: bash
        run: |
          bash ./tool/select_linux_runner.sh "$LINUX_GTK_VARIANT"
          if [[ "$LINUX_GTK_VARIANT" == "gtk4" ]]; then
            echo "LINUX_GTK_ARTIFACT_SUFFIX=-gtk4" >> "$GITHUB_ENV"
          else
            echo "LINUX_GTK_ARTIFACT_SUFFIX=" >> "$GITHUB_ENV"
          fi

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux (release)
        run: flutter build linux --release

      - name: Include LICENSE in bundle
        run: cp LICENSE build/linux/x64/release/bundle/

      - name: Upload Linux build artifact
        uses: richnetdesign/git-artifact-upload@v2
        with:
          name: boomprint-linux-build${{ env.LINUX_GTK_ARTIFACT_SUFFIX }}
          version: ${{ env.SEMVER }}
          filename: boomprint-linux-build${{ env.LINUX_GTK_ARTIFACT_SUFFIX }}
          path: build/linux/x64/release/bundle/**
          append-max-detail-suffix: true
          retention-days: 7

  linux_appimage:
    name: Linux AppImage
    # Temporarily disabled: current AppImage packaging path is unstable/broken.
    if: ${{ false }}
    runs-on: [ubuntu-latest]
    env:
      LINUX_GTK_VARIANT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.linux_gtk_variant || 'gtk3' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Ensure Git LFS assets
        shell: bash
        run: |
          if ! command -v git-lfs >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y git-lfs
          fi
          git lfs install --local
          git lfs pull

      - name: Set SEMVER
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            semver="${GITHUB_REF_NAME#v}"
          else
            semver="$(git describe --always --tags --dirty 2>/dev/null || true)"
            if [[ -z "$semver" ]]; then
              semver="$(git rev-parse --short HEAD 2>/dev/null || true)"
            fi
            if [[ -z "$semver" ]]; then
              semver="0.0.0-unknown"
            fi
          fi
          echo "SEMVER=$semver" >> "$GITHUB_ENV"

      - name: Git describe
        id: ghd
        shell: bash
        run: |
          echo "tag=$(git describe --always --tags --dirty)" >> "$GITHUB_OUTPUT"

      - name: Install AppImage build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ubuntu-keyring gnupg ca-certificates apt-transport-https
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev libgtk-4-dev liblzma-dev \
            libmimalloc-dev libmimalloc2.0 libpulse-dev libsecret-1-dev libssl-dev curl git \
            unzip xz-utils zip libglu1-mesa libstdc++-12-dev libasound2-dev \
            mpv libmpv-dev software-properties-common lld llvm \
            squashfs-tools patchelf desktop-file-utils zsync python3-venv fakeroot
          python3 -m venv .venv-appimage
          . .venv-appimage/bin/activate
          python -m pip install --upgrade pip
          pip install appimage-builder
          echo "$GITHUB_WORKSPACE/.venv-appimage/bin" >> "$GITHUB_PATH"

          # Some Flutter/Dart toolchains look for linker binaries under llvm-18 path.
          if [ ! -x /usr/lib/llvm-18/bin/ld.lld ] && command -v ld.lld >/dev/null 2>&1; then
            sudo mkdir -p /usr/lib/llvm-18/bin
            sudo ln -sf "$(command -v ld.lld)" /usr/lib/llvm-18/bin/ld.lld
          fi
          if [ ! -x /usr/lib/llvm-18/bin/ld ] && command -v ld >/dev/null 2>&1; then
            sudo mkdir -p /usr/lib/llvm-18/bin
            sudo ln -sf "$(command -v ld)" /usr/lib/llvm-18/bin/ld
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Select Linux runner variant
        shell: bash
        run: |
          bash ./tool/select_linux_runner.sh "$LINUX_GTK_VARIANT"
          if [[ "$LINUX_GTK_VARIANT" == "gtk4" ]]; then
            echo "LINUX_GTK_ARTIFACT_SUFFIX=-gtk4" >> "$GITHUB_ENV"
          else
            echo "LINUX_GTK_ARTIFACT_SUFFIX=" >> "$GITHUB_ENV"
          fi

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux (release)
        run: flutter build linux --release

      - name: Build AppImage
        run: appimage-builder --recipe appimage-builder.yml --skip-test

      - name: Version AppImage files
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in ./*.AppImage; do
            base=${f%.AppImage}
            mv "$f" "${base}-$SEMVER.AppImage"
          done
          for f in AppImage*.zsync; do
            base=${f%.zsync}
            mv "$f" "${base}-$SEMVER.zsync"
          done

      - name: Upload AppImage artifact
        uses: richnetdesign/git-artifact-upload@v2
        with:
          name: boomprint-appimage${{ env.LINUX_GTK_ARTIFACT_SUFFIX }}
          version: ${{ env.SEMVER }}
          filename: boomprint-appimage${{ env.LINUX_GTK_ARTIFACT_SUFFIX }}
          append-max-detail-suffix: true
          path: |
            ./*.AppImage
            AppImage*.zsync
          if-no-files-found: error
          retention-days: 7

  linux_flatpak:
    name: Linux Flatpak
    runs-on: [ubuntu-latest]
    env:
      LINUX_GTK_VARIANT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.linux_gtk_variant || 'gtk3' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
