          else
            semver="$(git describe --always --tags --dirty 2>/dev/null || true)"
            if [[ -z "$semver" ]]; then
              semver="$(git rev-parse --short HEAD 2>/dev/null || true)"
            fi
            if [[ -z "$semver" ]]; then
              semver="0.0.0-unknown"
            fi
          fi
          echo "SEMVER=$semver" >> "$GITHUB_ENV"

      - name: Install Linux and container build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev libgtk-4-dev \
            liblzma-dev libmimalloc-dev libmimalloc2.0 libpulse-dev libsecret-1-dev \
            libssl-dev curl git unzip xz-utils zip libglu1-mesa \
            libstdc++-12-dev libasound2-dev mpv libmpv-dev \
            software-properties-common lld llvm

          if ! command -v docker >/dev/null 2>&1 && ! command -v podman >/dev/null 2>&1; then
            sudo apt-get install -y podman
          fi

          command -v docker >/dev/null 2>&1 && docker --version || true
          command -v podman >/dev/null 2>&1 && podman --version || true

          if [ ! -x /usr/lib/llvm-18/bin/ld.lld ] && command -v ld.lld >/dev/null 2>&1; then
            sudo mkdir -p /usr/lib/llvm-18/bin
            sudo ln -sf "$(command -v ld.lld)" /usr/lib/llvm-18/bin/ld.lld
          fi
          if [ ! -x /usr/lib/llvm-18/bin/ld ] && command -v ld >/dev/null 2>&1; then
            sudo mkdir -p /usr/lib/llvm-18/bin
            sudo ln -sf "$(command -v ld)" /usr/lib/llvm-18/bin/ld
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Select Linux runner variant
        shell: bash
        run: |
          bash ./tool/select_linux_runner.sh "$LINUX_GTK_VARIANT"
          if [[ "$LINUX_GTK_VARIANT" == "gtk4" ]]; then
            echo "LINUX_GTK_ARTIFACT_SUFFIX=-gtk4" >> "$GITHUB_ENV"
          else
            echo "LINUX_GTK_ARTIFACT_SUFFIX=" >> "$GITHUB_ENV"
          fi

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux (release)
        run: flutter build linux --release

      - name: Build Flatpak bundle
        run: bash ./tool/build_flatpak_container.sh --out-dir "$RUNNER_TEMP/boomprint-flatpak"

      - name: Upload Flatpak artifact
        uses: richnetdesign/git-artifact-upload@v2
        with:
          name: boomprint-flatpak${{ env.LINUX_GTK_ARTIFACT_SUFFIX }}
          version: ${{ env.SEMVER }}
          filename: boomprint-flatpak${{ env.LINUX_GTK_ARTIFACT_SUFFIX }}
          append-max-detail-suffix: true
          path: ${{ runner.temp }}/boomprint-flatpak/com.rnd.boomprint.flatpak
          if-no-files-found: error
          retention-days: 7

  linux_deb:
    name: Linux Native DEB
    runs-on: [ubuntu-latest]
    env:
      LINUX_GTK_VARIANT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.linux_gtk_variant || 'gtk3' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
