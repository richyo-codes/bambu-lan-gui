  windows:
    name: Windows x64
    runs-on: [windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Ensure Git LFS assets
        shell: pwsh
        run: |
          if (-not (Get-Command git-lfs -ErrorAction SilentlyContinue)) {
            throw "git-lfs is not available on this Windows runner."
          }
          git lfs install --local
          git lfs pull

      - name: Set SEMVER
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            semver="${GITHUB_REF_NAME#v}"
          else
            semver="$(git describe --always --tags --dirty 2>/dev/null || true)"
            if [[ -z "$semver" ]]; then
              semver="$(git rev-parse --short HEAD 2>/dev/null || true)"
            fi
            if [[ -z "$semver" ]]; then
              semver="0.0.0-unknown"
            fi
          fi
          echo "SEMVER=$semver" >> "$GITHUB_ENV"

      - name: Git describe
        id: ghd
        shell: pwsh
        run: |
          "tag=$(git describe --always --tags --dirty)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Include LICENSE in Release folder
        shell: pwsh
        run: Copy-Item -Path LICENSE -Destination build\windows\x64\runner\Release\LICENSE

      - name: Upload Windows release bundle artifact
        uses: richnetdesign/git-artifact-upload@v2
        with:
          name: boomprint-windows-bundle
          version: ${{ env.SEMVER }}
          filename: boomprint-windows-bundle
          append-max-detail-suffix: true
          path: build/windows/x64/runner/Release/**
          if-no-files-found: error
          retention-days: 7

      # - name: Build Windows MSI
      #   if: runner.os == 'Windows'
      #   shell: pwsh
      #   run: |
      #     .\tool\build_msi.ps1 `
      #       -Configuration Release `
      #       -OutputDir build\windows\x64\installer `
      #       -ProductVersion "${{ env.SEMVER }}"

      # - name: Upload Windows MSI artifact
      #   if: runner.os == 'Windows'
      #   uses: richnetdesign/git-artifact-upload@v2
      #   with:
      #     name: boomprint-windows-msi
      #     version: ${{ env.SEMVER }}
      #     filename: boomprint-windows-msi
      #     append-max-detail-suffix: true
      #     path: build/windows/x64/installer/*.msi
      #     if-no-files-found: error
      #     retention-days: 7

      - name: Create Windows MSIX (unsigned)
        run: |
          flutter pub get
          dart run msix:create

      - name: Version MSIX file(s)
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.msix | ForEach-Object {
            $dir = $_.DirectoryName
            $base = [System.IO.Path]::GetFileNameWithoutExtension($_.Name)
            Rename-Item -Path $_.FullName -NewName "$base-$env:SEMVER.msix"
          }

      - name: Upload Windows MSIX artifact
        uses: richnetdesign/git-artifact-upload@v2
        with:
          name: boomprint-windows-msix
          version: ${{ env.SEMVER }}
          filename: boomprint-windows-msix
          path: '**/*.msix'
          retention-days: 7

