name: Flutter Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version
        uses: ./.github/actions/compute-version

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Android (debug APK)
        run: flutter build apk --debug

      - name: Stage artifacts with LICENSE
        run: |
          mkdir -p artifacts/android
          cp build/app/outputs/flutter-apk/app-debug.apk "artifacts/android/app-debug-$SEMVER.apk"
          cp LICENSE artifacts/android/

      - name: Build Android (release APK)
        run: flutter build apk --release

      - name: Stage artifacts with LICENSE
        run: |
          mkdir -p artifacts/android
          cp build/app/outputs/flutter-apk/app-release.apk "artifacts/android/app-release-$SEMVER.apk"
          cp LICENSE artifacts/android/

      - name: Upload Android artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ env.SEMVER }}
          path: artifacts/android/**
          retention-days: 7

  linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version
        uses: ./.github/actions/compute-version

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmimalloc-dev libmimalloc2.0 libpulse-dev libssl-dev curl git unzip xz-utils zip libglu1-mesa pkg-config libstdc++-12-dev libasound2-dev mpv libmpv-dev software-properties-common
          sudo apt-get install -y mpv squashfs-tools patchelf desktop-file-utils zsync

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux (release)
        run: flutter build linux --release

      - name: Include LICENSE in bundle
        run: cp LICENSE build/linux/x64/release/bundle/

      - name: Upload Linux artifact (bundle)
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-bundle-${{ env.SEMVER }}
          path: build/linux/x64/release/bundle/**
          retention-days: 7

      - name: Build Linux release bundle                                                                                                                                                                      
        run: flutter build linux --release                                                            
                                                                                                      
      - name: Install appimage-builder            
        run: |                                    
          python3 -m pip install --upgrade --user pip                                                                                                                                                         
          python3 -m pip install --user appimage-builder                                                                                                                                                      
          echo "$HOME/.local/bin" >> $GITHUB_PATH 
                                                                                                                                                                                                              
      - name: Build AppImage                                                                                                                                                                                  
        run: appimage-builder --recipe appimage-builder.yml --skip-test
                                                  
      - name: Version AppImage files
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Rename AppImage
          for f in ./*.AppImage; do
            base=${f%.AppImage}
            mv "$f" "${base}-$SEMVER.AppImage"
          done
          # Rename zsync if present
          for f in AppImage*.zsync; do
            base=${f%.zsync}
            mv "$f" "${base}-$SEMVER.zsync"
          done

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:                                                                                                                                                                                                 
          name: Bambu-RTSP-Stream-AppImage-${{ env.SEMVER }}                                                                                                                                                  
          path: |                                 
            ./*.AppImage                                                                                                                                                                                      
            AppImage*.zsync                                                                                                                                                                                   
          if-no-files-found: error   

  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version
        uses: ./.github/actions/compute-version

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Include LICENSE in Release folder
        shell: pwsh
        run: Copy-Item -Path LICENSE -Destination build\windows\x64\runner\Release\LICENSE

      - name: Upload Windows artifact (Release folder)
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-release-${{ env.SEMVER }}
          path: build/windows/x64/runner/Release/**
          retention-days: 7

      - name: Create Windows MSIX (unsigned)
        run: |
          flutter pub get
          dart run msix:create

      - name: Version MSIX file(s)
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.msix | ForEach-Object {
            $dir = $_.DirectoryName
            $base = [System.IO.Path]::GetFileNameWithoutExtension($_.Name)
            Rename-Item -Path $_.FullName -NewName "$base-$env:SEMVER.msix"
          }

      - name: Upload Windows MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix-${{ env.SEMVER }}
          path: '**/*.msix'
          retention-days: 7

  ios:
    name: iOS (no codesign)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version
        uses: ./.github/actions/compute-version

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign

      - name: Package Runner.app
        run: |
          cd build/ios/iphoneos
          cp "$GITHUB_WORKSPACE/LICENSe" LICENSE 2>/dev/null || true
          # Ensure LICENSE present; fall back to workspace path
          if [ ! -f LICENSE ]; then cp "$GITHUB_WORKSPACE/LICENSE" LICENSE; fi
          zip -r "Runner-$SEMVER.app.zip" Runner.app LICENSE

      - name: Upload iOS artifact (Runner.app.zip)
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app-${{ env.SEMVER }}
          path: build/ios/iphoneos/Runner-*.app.zip
          retention-days: 7
