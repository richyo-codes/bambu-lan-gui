<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CFFAFE"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0EA5A4"/>
      <stop offset="100%" stop-color="#0B6F74"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="180" ry="180" fill="url(#bg)"/>

  <!-- Printer frame -->
  <rect x="220" y="240" width="584" height="560" rx="36" ry="36" fill="#062B2A" opacity="0.4"/>
  <rect x="252" y="272" width="520" height="496" rx="24" ry="24" fill="none" stroke="#E6FFFB" stroke-width="16"/>
  <rect x="290" y="320" width="444" height="20" rx="10" fill="#99F6E4"/>
  <rect x="290" y="700" width="444" height="20" rx="10" fill="#99F6E4"/>

  <!-- Camera eye on gantry -->
  <rect x="470" y="344" width="84" height="44" rx="12" fill="#0B1324" opacity="0.7"/>
  <circle cx="512" cy="366" r="18" fill="#E2E8F0"/>
  <circle cx="512" cy="366" r="8" fill="#0B1324"/>

  <!-- 3D cube being printed -->
  <ellipse cx="512" cy="660" rx="170" ry="46" fill="#0B1324" opacity="0.25"/>
  <polygon points="512,460 650,540 512,620 374,540" fill="url(#cubeTop)"/>
  <polygon points="374,540 512,620 512,740 374,660" fill="url(#cubeLeft)"/>
  <polygon points="650,540 512,620 512,740 650,660" fill="url(#cubeRight)"/>
</svg>
