      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="180" ry="180" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="260" y="420" width="380" height="220" rx="28" ry="28" fill="#0B1324" opacity="0.5"/>
  <rect x="280" y="440" width="340" height="180" rx="20" ry="20" fill="#E2E8F0"/>
