<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B4F6C"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="180" ry="180" fill="url(#bg)"/>

  <!-- Shield -->
  <path d="M512 200 C 640 252, 740 276, 812 290 C 812 560, 700 710, 512 800 C 324 710, 212 560, 212 290 C 284 276, 384 252, 512 200 Z"
        fill="url(#shield)" opacity="0.35" stroke="#E0F2FE" stroke-width="14"/>

  <!-- 3D cube inside -->
  <polygon points="512,360 660,440 512,520 364,440" fill="url(#cubeTop)"/>
  <polygon points="364,440 512,520 512,680 364,600" fill="url(#cubeLeft)"/>
  <polygon points="660,440 512,520 512,680 660,600" fill="url(#cubeRight)"/>

  <!-- Eye overlay -->
  <ellipse cx="512" cy="500" rx="90" ry="52" fill="#F8FAFC" stroke="#0B1324" stroke-width="8"/>
  <circle cx="512" cy="500" r="22" fill="#1D4ED8"/>
  <circle cx="512" cy="500" r="10" fill="#0B1324"/>
  <circle cx="522" cy="492" r="5" fill="#F8FAFC"/>
</svg>
