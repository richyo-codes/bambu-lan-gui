
flutter_launcher_icons:

  android: true
  ios: true
  image_path: assets/icons/renders/lan_shield.png # Export this PNG from app_icon.svg at 1024x1024
  adaptive_icon_foreground:  assets/icons/renders/lan_shield.png
  adaptive_icon_background: '#0E1116'
  web:
    generate: true
    image_path: assets/icons/renders/lan_shield.png
    background_color: '#0E1116'
    theme_color: '#0E1116'
  macos:
    generate: true
    image_path: assets/icons/renders/lan_shield.png
  windows:
    generate: true
    image_path: assets/icons/renders/lan_shield.png
    icon_size: 48
  linux:
    generate: true
    image_path: assets/icons/renders/lan_shield.png


  # Generate per-flavor icons. Run with:
  #   flutter pub run flutter_launcher_icons -f pubspec.yaml --flavor <flavor>
  # Example: --flavor filament | home | lan | stream | cube
  flavors:
    filament:
      image_path: assets/icons/renders/filament_spool.png
      android: true
      ios: true
      web: true
      macos: true
      windows: true
      linux: true
    home:
      image_path: assets/icons/renders/printer_home.png
      android: true
      ios: true
      web: true
      macos: true
      windows: true
      linux: true
    lan:
      image_path: assets/icons/renders/lan_cable.png
      android: true
      ios: true
      web: true
      macos: true
      windows: true
      linux: true
    stream:
      image_path: assets/icons/renders/stream_cam.png
      android: true
      ios: true
      web: true
      macos: true
      windows: true
      linux: true
    cube:
      image_path: assets/icons/renders/printer_cube.png
      android: true
      ios: true
      web: true
      macos: true
      windows: true
      linux: true
    lan_shield:
      image_path: assets/icons/renders/lan_shield.png
      android: true
      ios: true
      web: true
      macos: true
      windows: true
      linux: true
