
flutter_launcher_icons:
  # Single icon source for all platforms:
  # assets/icons/icon_printer_home_shield.svg
  # Exported render used by flutter_launcher_icons:
  # assets/icons/renders/printer_home_shield.png

  android: true
  ios: true
  image_path: assets/icons/renders/printer_home_shield.png
  adaptive_icon_foreground: assets/icons/renders/printer_home_shield.png
  adaptive_icon_background: '#0F3D91'
  web:
    generate: true
    image_path: assets/icons/renders/printer_home_shield.png
    background_color: '#0F3D91'
    theme_color: '#0F3D91'
  macos:
    generate: true
    image_path: assets/icons/renders/printer_home_shield.png
  windows:
    generate: true
    image_path: assets/icons/renders/printer_home_shield.png
    icon_size: 48
  linux:
    generate: true
    image_path: assets/icons/renders/printer_home_shield.png
