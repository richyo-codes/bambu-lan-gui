app-id: com.rnd.bambu_lan
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: run-printer-lan
add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    version: '24.08'
    directory: lib/ffmpeg
    add-ld-path: lib
finish-args:
  - --share=network
  - --socket=wayland
  - --socket=x11
  - --device=dri
  - --share=ipc
  - --socket=pulseaudio
  #- --filesystem=host-os:ro
modules:
  - name: rnd-bambu-rtsp-stream
    buildsystem: simple
    sources:
      # Built Flutter bundle (run `flutter build linux` first)
      - type: dir
        path: ../build/linux/x64/release/bundle
        dest: bundle
      # Package metadata (desktop/metainfo/icon) from this folder
      - type: dir
        path: .
        dest: flatpak
    build-commands:
      # Install Flutter bundle under /app/bin so lib & data sit next to the binary
      - install -Dm755 bundle/printer_lan /app/bin/printer_lan
      - cp -r bundle/data /app/bin/
      - cp -r bundle/lib /app/bin/
      # Launcher: scope custom loader paths to app process only.
      # - |
      #   cat > /app/bin/run-printer-lan <<'EOF'
      #   #!/usr/bin/env sh
      #   export LD_LIBRARY_PATH="/run/host/usr/lib64:/run/host/lib64:/run/host/usr/lib64/pulseaudio:/run/host/usr/lib64/pipewire-0.3/jack:/run/host/usr/lib64/samba:/app/bin/lib:/app/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
      #   exec /app/bin/printer_lan "$@"
      #   EOF
      - chmod 755 /app/bin/run-printer-lan
      # Ensure extension mount point exists for org.freedesktop.Platform.ffmpeg-full
      - install -d /app/lib/ffmpeg
      # Install desktop & metadata
      - install -Dm644 flatpak/com.rnd.bambu_lan.desktop /app/share/applications/com.rnd.bambu_lan.desktop
      - install -Dm644 flatpak/com.rnd.bambu_lan.metainfo.xml /app/share/metainfo/com.rnd.bambu_lan.metainfo.xml
      - install -Dm644 flatpak/icons/com.rnd.bambu_lan.svg /app/share/icons/hicolor/scalable/apps/com.rnd.bambu_lan.svg
